name: Backup primary PostgreSQL to Neon backup project

on:
  workflow_dispatch:
  schedule:
    # Daily at 03:20 UTC. Adjust after choosing final production maintenance window.
    - cron: '20 3 * * *'

jobs:
  backup-to-neon:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Run backup job
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: 'true'
          NEON_BACKUP_DATABASE_URL: ${{ secrets.NEON_BACKUP_DATABASE_URL }}
          BACKUP_FILE_DIR: ./backups
          BACKUP_KEEP_LOCAL_FILES: 'false'
          NEON_BACKUP_DROP_TARGET_BEFORE_RESTORE: 'false'
        run: npm run backup:neon
