name: Backend Quality Gate

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: newspaper
          POSTGRES_PASSWORD: newspaper
          POSTGRES_DB: newspaper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U newspaper -d newspaper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api/v1
      DATABASE_URL: postgres://newspaper:newspaper@localhost:5432/newspaper_test
      DATABASE_SSL: 'false'
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-quality-gate-secret-with-more-than-32-characters
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: 30
      CORS_ORIGINS: http://localhost:3000
      RATE_LIMIT_ENABLED: 'true'
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_AUTH_MAX: 8
      SECURITY_SMOKE_RATE_LIMIT_ATTEMPTS: 12
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Yarn through Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          yarn --version

      - name: Install dependencies with Yarn
        run: |
          if [ -f yarn.lock ]; then
            yarn install --immutable
          else
            echo "yarn.lock was not found; running yarn install to keep CI compatible."
            echo "For stricter CI, run 'yarn install' locally, commit yarn.lock, then this workflow will use --immutable."
            yarn install
          fi

      - run: yarn db:validate
      - run: yarn postman:validate
      - run: yarn audit:moderate
      - run: yarn typecheck
      - run: yarn build
      - run: yarn test:unit
      - run: yarn test:contracts
      - run: yarn db:migrate
      - run: yarn db:seed
      - run: yarn test:smoke:db

      - name: Start API
        run: |
          yarn start > /tmp/newspaper-api.log 2>&1 &
          echo $! > /tmp/newspaper-api.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/api/v1/health/live >/dev/null; then exit 0; fi
            sleep 2
          done
          cat /tmp/newspaper-api.log
          exit 1

      - run: yarn test:smoke:http
      - run: yarn test:security
      - run: yarn start:worker:events:once

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/newspaper-api.pid ]; then kill $(cat /tmp/newspaper-api.pid) || true; fi

      - name: Print API logs on failure
        if: failure()
        run: |
          if [ -f /tmp/newspaper-api.log ]; then cat /tmp/newspaper-api.log; fi
