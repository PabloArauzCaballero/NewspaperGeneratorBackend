name: Backend Quality Gate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: newspaper_test
          POSTGRES_USER: newspaper
          POSTGRES_PASSWORD: newspaper
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U newspaper -d newspaper_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api/v1

      DATABASE_URL: postgresql://newspaper:newspaper@localhost:5432/newspaper_test
      DATABASE_SSL: false

      REDIS_URL: redis://localhost:6379

      JWT_SECRET: ci-quality-gate-secret-with-more-than-32-characters
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: 30

      CORS_ORIGINS: http://localhost:3000

      RATE_LIMIT_ENABLED: true
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_AUTH_MAX: 8
      SECURITY_SMOKE_RATE_LIMIT_ATTEMPTS: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.9.2 --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate migrations
        run: yarn db:validate

      - name: Validate Postman collection
        run: yarn postman:validate

      - name: Audit dependencies
        run: yarn audit:moderate

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Unit tests
        run: yarn test:unit

      - name: Contract tests
        run: yarn test:contracts

      - name: Run migrations
        run: yarn db:migrate

      - name: Run seeds
        run: yarn db:seed

      - name: DB smoke
        run: yarn test:smoke:db

      - name: Start API server
        run: |
          yarn start:dev > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/api/v1/health/ready; then
              echo "API is ready"
              exit 0
            fi

            echo "Waiting for API..."
            sleep 2
          done

          echo "API did not become ready"
          cat server.log
          exit 1

      - name: HTTP smoke
        run: yarn test:smoke:http

      - name: Security smoke
        run: yarn test:security

      - name: Event worker once
        run: yarn start:worker:events:once

      - name: Stop API server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Print server logs on failure
        if: failure()
        run: |
          if [ -f server.log ]; then
            cat server.log
          fi